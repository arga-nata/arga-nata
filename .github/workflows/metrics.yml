name: Metrics
on:
  schedule:
    - cron: "0 */6 * * *" # Update every 6 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: arga-nata
          template: classic
          base: "" # Base path for the image
          plugin_wakatime: yes
          wakatime_api_key: ${{ secrets.WAKATIME_API_KEY }}
          wakatime_langs_count: 5
          plugin_activity: yes
          activity_limit: 5
          config_timezone: "Asia/Jakarta"
          # Theme and style
          theme: tokyonight
          hide_border: true
          hide_source: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
